{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-checker-metrics
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /actuator/prometheus
spec:
  rules:
    - http:
        paths:
          - path: /metrics/sms-checker-app
            pathType: Prefix
            backend:
              service:
                name: sms-checker-app
                port:
                  name: http

          - path: /metrics/model-service
            pathType: Prefix
            backend:
              service:
                name: model-service
                port:
                  name: http
{{- end }}
